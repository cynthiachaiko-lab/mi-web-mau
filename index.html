      modelos: ['Hilux', 'SW4'], anio: '2010-2023', voltaje: '14V', potencia: '120A',

  const $ = (id) => document.getElementById(id);
  const proveedorKeys = Object.keys(PROVEEDORES);
  const activos = new Set(proveedorKeys);

  const money = new Intl.NumberFormat('es-AR', {
    style: 'currency',
    currency: 'ARS',
    maximumFractionDigits: 0
  });

  function esc(value) {
    return String(value ?? '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function normalizar(value) {
    return String(value ?? '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  function totalProveedor(key) {
    return PRODUCTOS.reduce((sum, p) => {
      return sum + p.ofertas.filter(o => o.proveedor === key).reduce((a, o) => a + o.stock, 0);
    }, 0);
  }

  function renderProveedores() {
    $('fp-proveedores').innerHTML = `
      <span class="fp-filter-label">Proveedor</span>
      ${proveedorKeys.map(key => `
        <button class="fp-provider is-active" type="button" data-provider="${key}" aria-pressed="true">
          ${PROVEEDORES[key].nombre}
          <small>${totalProveedor(key)} u.</small>
        </button>
      `).join('')}
    `;

    document.querySelectorAll('.fp-provider').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.provider;
        activos.has(key) ? activos.delete(key) : activos.add(key);
        if (activos.size === 0) activos.add(key);
        actualizarProveedores();
        render();
      });
    });
  }

  function actualizarProveedores() {
    document.querySelectorAll('.fp-provider').forEach(btn => {
      const isActive = activos.has(btn.dataset.provider);
      btn.classList.toggle('is-active', isActive);
      btn.setAttribute('aria-pressed', String(isActive));
    });
  }

  function renderModelos(marca) {
    const select = $('fp-modelo');
    select.innerHTML = '<option value="">Todos</option>';
    select.disabled = !marca;

    if (!marca || !modelos[marca]) return;

    modelos[marca].forEach(modelo => {
      const option = document.createElement('option');
      option.value = modelo;
      option.textContent = modelo;
      select.appendChild(option);
    });
  }

  function stockClass(stock) {
    if (stock <= 0) return ['none', 'Sin stock'];
    if (stock <= 2) return ['low', `${stock} u. bajo`];
    return ['ok', `${stock} unidades`];
  }

  function filtrar() {
    const cat = $('fp-cat').value;
    const marca = $('fp-marca').value;
    const modelo = $('fp-modelo').value;
    const texto = normalizar($('fp-texto').value.trim());
    const soloStock = $('fp-solo-stock').checked;

    return PRODUCTOS.map(producto => {
      let ofertas = producto.ofertas.filter(o => activos.has(o.proveedor));
      if (soloStock) ofertas = ofertas.filter(o => o.stock > 0);
      if (!ofertas.length) return null;

      if (cat && producto.categoria !== cat) return null;
      if (marca && producto.marca !== marca) return null;
      if (modelo && !producto.modelos.includes(modelo)) return null;

      if (texto) {
        const base = normalizar([
          producto.nombre, producto.marca, producto.modelos.join(' '), producto.anio,
          producto.voltaje, producto.potencia, CATEGORIAS[producto.categoria]
        ].join(' '));

        const codigos = normalizar(ofertas.map(o => [
          o.codigo, o.codigoOrig, PROVEEDORES[o.proveedor].nombre
        ].join(' ')).join(' '));

        if (!base.includes(texto) && !codigos.includes(texto)) return null;
      }

      ofertas.sort((a, b) => Number(b.stock > 0) - Number(a.stock > 0) || a.precio - b.precio);
      return { ...producto, ofertas };
    }).filter(Boolean).sort((a, b) => {
      const stockA = a.ofertas.reduce((s, o) => s + o.stock, 0);
      const stockB = b.ofertas.reduce((s, o) => s + o.stock, 0);
      return Number(stockB > 0) - Number(stockA > 0) || a.nombre.localeCompare(b.nombre);
    });
  }

  function renderOferta(of) {
    const prov = PROVEEDORES[of.proveedor];
    const [clase, label] = stockClass(of.stock);

    return `
      <div class="fp-stock-row">
        <div class="fp-cell" data-label="Proveedor">
          <span class="fp-supplier ${of.proveedor}">${esc(prov.nombre)}</span>
        </div>
        <div class="fp-cell fp-mono" data-label="Código">${esc(of.codigo)}</div>
        <div class="fp-cell fp-mono" data-label="Original">${esc(of.codigoOrig)}</div>
        <div class="fp-cell" data-label="Stock">
          <span class="fp-stock-pill ${clase}">${esc(label)}</span>
        </div>
        <div class="fp-cell fp-mono" data-label="Precio">${money.format(of.precio)}</div>
      </div>
    `;
  }

  function renderCard(producto) {
    const totalStock = producto.ofertas.reduce((sum, o) => sum + o.stock, 0);
    const mejor = producto.ofertas.filter(o => o.stock > 0).sort((a, b) => a.precio - b.precio)[0];
    const mejorProveedor = mejor ? PROVEEDORES[mejor.proveedor].nombre : 'Consultar';

    return `
      <article class="fp-card">
        <div class="fp-card-top">
          <div>
            <div class="fp-kicker">${esc(CATEGORIAS[producto.categoria])} / ${esc(producto.marca)}</div>
            <h3>${esc(producto.nombre)}</h3>
            <div class="fp-tags">
              <span class="fp-tag">${esc(producto.modelos.join(' · '))}</span>
              <span class="fp-tag">${esc(producto.anio)}</span>
              <span class="fp-tag">${esc(producto.voltaje)}</span>
              <span class="fp-tag">${esc(producto.potencia)}</span>
              <span class="fp-tag">${totalStock} u. total</span>
            </div>
          </div>
          <div class="fp-price">
            <span>Mejor precio con stock</span>
            <strong>${mejor ? money.format(mejor.precio) : 'Sin stock'}</strong>
            <small>${esc(mejorProveedor)}</small>
          </div>
        </div>

        <div class="fp-stock-table">
          <div class="fp-stock-head">
            <div>Proveedor</div>
            <div>Código</div>
            <div>Cód. original</div>
            <div>Stock</div>
            <div>Precio</div>
          </div>
          ${producto.ofertas.map(renderOferta).join('')}
        </div>
      </article>
    `;
  }

  function render() {
    const resultados = filtrar();
    const unidades = resultados.reduce((sum, p) => sum + p.ofertas.reduce((a, o) => a + o.stock, 0), 0);

    $('fp-count').textContent = `${resultados.length} repuestos`;
    $('fp-units').textContent = `${unidades} unidades`;
    $('fp-subtitle').textContent = resultados.length
      ? 'Mostrando stock visible según filtros activos'
      : 'No hay coincidencias con esos filtros';

    $('fp-results').innerHTML = resultados.length
      ? resultados.map(renderCard).join('')
      : `<div class="fp-panel fp-empty"><strong>Sin resultados</strong>Probá cambiando proveedor, modelo o texto de búsqueda.</div>`;
  }

  $('fp-form').addEventListener('submit', (e) => {
    e.preventDefault();
    render();
  });

  $('fp-marca').addEventListener('change', () => {
    renderModelos($('fp-marca').value);
    $('fp-modelo').value = '';
    render();
  });

  ['fp-cat', 'fp-modelo', 'fp-solo-stock'].forEach(id => {
    $(id).addEventListener('change', render);
  });

  $('fp-texto').addEventListener('input', render);

  document.querySelectorAll('.fp-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      $('fp-cat').value = btn.dataset.cat || '';
      $('fp-marca').value = btn.dataset.marca || '';
      $('fp-texto').value = '';
      renderModelos($('fp-marca').value);
      $('fp-modelo').value = '';
      render();
    });
  });

  $('fp-limpiar').addEventListener('click', () => {
    $('fp-cat').value = '';
    $('fp-marca').value = '';
    $('fp-texto').value = '';
    $('fp-solo-stock').checked = false;
    renderModelos('');
    $('fp-modelo').value = '';
    activos.clear();
    proveedorKeys.forEach(key => activos.add(key));
    actualizarProveedores();
    render();
  });

  renderProveedores();
  render();
})();
</script>
